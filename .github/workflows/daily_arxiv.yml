name: Daily arXiv Papers

on:
  schedule:
    # 每天 UTC 时间 0:00 运行（北京时间 8:00）
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'arXiv category/categories, comma separated'
        required: false
        default: 'hep-ex'
      days:
        description: 'Number of days to search back'
        required: false
        default: '1'
      max_results:
        description: 'Maximum source papers'
        required: false
        default: '10'
      related_per_paper:
        description: 'Related papers per source paper'
        required: false
        default: '5'
      email:
        description: 'Send email notification (true/false)'
        required: false
        default: 'true'

jobs:
  fetch-papers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch and send papers
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USE_SSL: ${{ vars.SMTP_USE_SSL || 'false' }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'gpt-4o-mini' }}
          USD_CNY_RATE: ${{ vars.USD_CNY_RATE || '7.2' }}
          INCLUDE_CROSS_LIST: ${{ vars.INCLUDE_CROSS_LIST || 'false' }}
          RELATED_SEARCH_LIMIT: ${{ vars.RELATED_SEARCH_LIMIT || '20' }}
          MAX_QUERY_TERMS: ${{ vars.MAX_QUERY_TERMS || '5' }}
          TRANSLATE_TITLES: ${{ vars.TRANSLATE_TITLES || 'false' }}
        run: |
          CATEGORY="${{ github.event.inputs.category || vars.ARXIV_CATEGORY || 'hep-ex' }}"
          DAYS="${{ github.event.inputs.days || 1 }}"
          MAX_RESULTS="${{ github.event.inputs.max_results || vars.ARXIV_MAX_RESULTS || 10 }}"
          RELATED_PER_PAPER="${{ github.event.inputs.related_per_paper || vars.RELATED_PER_PAPER || 5 }}"
          EMAIL="${{ github.event.inputs.email || 'true' }}"
          EMAIL_FLAG=""
          if [ "$EMAIL" = "true" ]; then
            EMAIL_FLAG="--email"
          fi
          python main.py \
            --category "$CATEGORY" \
            --days "$DAYS" \
            --max-results "$MAX_RESULTS" \
            --related-per-paper "$RELATED_PER_PAPER" \
            $EMAIL_FLAG
